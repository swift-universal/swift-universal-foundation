name: "\U0001F3CE️ Swift Build| SwiftUniversalFoundation"
on:
  push:
    branches:
    - main
    paths:
    - '**'
  pull_request:
    branches:
    - main
jobs:
  swift-build:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Cache SPM dependencies
      id: cache-spm
      uses: actions/cache@v4
      with:
        path: apple/SwiftUniversalFoundation/.build
        restore-keys: ${{ runner.os }}-spm-SwiftUniversalFoundation-
        key: ${{ runner.os }}-spm-SwiftUniversalFoundation-${{ hashFiles('**/Package.resolved', '**/Package.swift')
          }}
    - name: Check Cache
      run: 'echo ''Cache hit: ${{ steps.cache-spm.outputs.cache-hit }}'''
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      if: matrix.os == 'macos-latest' || matrix.os == 'macos-15' || matrix.os == 'self-hosted'
      with:
        xcode-version: '16.4'
    - name: Swift Describe
      if: steps.cache-spm.outputs.cache-hit != 'true'
      run: swift package describe --type json
    - name: Set CI Style
      run: echo "SPM_CI_USE_LOCAL_DEPS=false" >> $GITHUB_ENV
    - name: Configure Git auth for private dependencies
      shell: bash
      env:
        ORG_READ_TOKEN: ${{ secrets.ORG_PAGES_TOKEN }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        TOKEN="${ORG_READ_TOKEN:-${GH_TOKEN}}"
        git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"
    - name: Check CI Style
      run: '[ -z "${SPM_CI_USE_LOCAL_DEPS}" ] && echo "SPM_CI_LOCAL_DEPS is not set"
        || echo "SPM_CI_USE_LOCAL_DEPS is set to ${SPM_CI_USE_LOCAL_DEPS}"'
      env:
        SPM_CI_USE_LOCAL_DEPS: ${{ env.SPM_CI_USE_LOCAL_DEPS }}
    - name: Swift Build
      run: swift build --target SwiftUniversalFoundation
